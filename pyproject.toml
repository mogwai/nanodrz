[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nanodiarization"
description = "Speaker Diarisation with Transformers"
version = "0.1.0"
dependencies = [
    "click",
    "descript-audio-codec",
    "einop",
    "textgrid",
    "torch",
    "torchaudio",
    "transformers",
    "tqdm",
    "pydantic",
    "wandb",
]

[project.optional-dependencies]
dev = [
    "black",
    "gradio==4.7.1",
    "ipywidgets",
    "isort",
    "jupyterlab",
    "mypy",
    "pip-tools",
    "pre-commit",
    "pylint",
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "flake8",
]

[tool.setuptools]
package-dir = { "" = "src" }

[project.scripts]
train = "nanodiarization.train:main"
step = "nanodiarization.model:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*", "*_test"]
